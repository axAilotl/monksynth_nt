name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            cmake_flags: ""
            artifact_name: MonkSynth-VST3-Windows
          # - os: macos-latest
          #   name: macOS
          #   cmake_flags: '-G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DSMTG_AUDIOUNIT_SDK_PATH=/tmp/AudioUnitSDK-AudioUnitSDK-1.1.0'
          #   artifact_name: MonkSynth-VST3-macOS
          - os: ubuntu-latest
            name: Linux
            cmake_flags: "-DCMAKE_BUILD_TYPE=Release"
            artifact_name: MonkSynth-VST3-Linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libxcb-util-dev \
            libxcb-cursor-dev libxcb-keysyms1-dev libxcb-xkb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libfontconfig1-dev \
            libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev libxcb-util0-dev

      - name: Install AudioUnit SDK (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL https://github.com/apple/AudioUnitSDK/archive/refs/tags/AudioUnitSDK-1.1.0.tar.gz -o /tmp/ausdk.tar.gz
          tar xzf /tmp/ausdk.tar.gz -C /tmp

      - name: Cache VST3 SDK
        uses: actions/cache@v5
        with:
          path: cpp/build/_deps
          key: vst3sdk-v3.8.0_build_66-${{ runner.os }}

      - name: Import code signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -hex 16)

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Extract version label
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            LABEL="${TAG#*-}"
            if [ "$LABEL" = "$TAG" ]; then LABEL="release"; fi
          else
            LABEL="dev"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Version label: $LABEL"

      - name: Configure
        working-directory: cpp
        run: |
          SIGNING_FLAGS=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            SIGNING_FLAGS='-DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=Developer ID Application -DCMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_STYLE=Manual'
          fi
          cmake -B build ${{ matrix.cmake_flags }} $SIGNING_FLAGS -DMONKSYNTH_VERSION_LABEL="${{ steps.version.outputs.label }}"

      - name: Build VST3
        working-directory: cpp
        run: cmake --build build --config Release --target MonkSynth

      - name: Build AudioUnit
        if: runner.os == 'macOS'
        working-directory: cpp
        run: cmake --build build --config Release --target MonkSynth-au

      - name: Find VST3 bundle
        id: find_vst3
        shell: bash
        run: |
          VST3=$(find cpp/build -name "MonkSynth.vst3" -type d | head -1)
          echo "path=$VST3" >> "$GITHUB_OUTPUT"
          echo "Found VST3 at: $VST3"

      - name: Find AU bundle
        if: runner.os == 'macOS'
        id: find_au
        shell: bash
        run: |
          AU=$(find cpp/build -name "MonkSynth.component" -type d | head -1)
          echo "path=$AU" >> "$GITHUB_OUTPUT"
          echo "Found AU at: $AU"

      - name: Package VST3
        shell: bash
        run: |
          cd "$(dirname "${{ steps.find_vst3.outputs.path }}")"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a -tzip "$GITHUB_WORKSPACE/${{ matrix.artifact_name }}.zip" "MonkSynth.vst3"
          else
            zip -r "$GITHUB_WORKSPACE/${{ matrix.artifact_name }}.zip" "MonkSynth.vst3"
          fi

      - name: Package AU
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd "$(dirname "${{ steps.find_au.outputs.path }}")"
          zip -r "$GITHUB_WORKSPACE/MonkSynth-AU-macOS.zip" "MonkSynth.component"

      - name: Notarize VST3
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ matrix.artifact_name }}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          cd "$(dirname "${{ steps.find_vst3.outputs.path }}")"
          xcrun stapler staple "MonkSynth.vst3"
          cd "$GITHUB_WORKSPACE"
          rm "${{ matrix.artifact_name }}.zip"
          cd "$(dirname "${{ steps.find_vst3.outputs.path }}")"
          zip -r "$GITHUB_WORKSPACE/${{ matrix.artifact_name }}.zip" "MonkSynth.vst3"

      - name: Notarize AU
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "MonkSynth-AU-macOS.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          cd "$(dirname "${{ steps.find_au.outputs.path }}")"
          xcrun stapler staple "MonkSynth.component"
          cd "$GITHUB_WORKSPACE"
          rm "MonkSynth-AU-macOS.zip"
          cd "$(dirname "${{ steps.find_au.outputs.path }}")"
          zip -r "$GITHUB_WORKSPACE/MonkSynth-AU-macOS.zip" "MonkSynth.component"

      - name: Upload VST3
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

      - name: Upload AU
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: MonkSynth-AU-macOS
          path: MonkSynth-AU-macOS.zip

      - name: Clean up keychain
        if: runner.os == 'macOS' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          name: "MonkSynth ${{ github.ref_name }} (Beta)"
          body: |
            ## MonkSynth ${{ github.ref_name }} Beta Release

            Pre-release beta build for testing. Please report issues!

            ### Installation

            - **Windows (VST3):** Extract and copy `MonkSynth.vst3` to `C:\Program Files\Common Files\VST3\`
            - **macOS (VST3):** Extract and copy to `~/Library/Audio/Plug-Ins/VST3/`
            - **macOS (AU):** Extract and copy to `~/Library/Audio/Plug-Ins/Components/`
            - **Linux (VST3):** Extract and copy to `~/.vst3/`

            ### Notes
            - macOS build is Universal (arm64 + x86_64)
            - macOS: signed with Developer ID
            - Requires a DAW with VST3 support (or AU on macOS)
          files: |
            artifacts/MonkSynth-VST3-Windows/*.zip
            artifacts/MonkSynth-VST3-macOS/*.zip
            artifacts/MonkSynth-AU-macOS/*.zip
            artifacts/MonkSynth-VST3-Linux/*.zip
