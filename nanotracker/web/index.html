<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MonkSynth</title>
  <style>
    :root {
      color-scheme: dark;
      --color-primary: #e58a3a;
      --color-primary-dim: #7a3b16;
      --color-primary-glow: rgba(229, 138, 58, 0.26);
      --color-bg: #22100a;
      --color-bg-elevated: #31170d;
      --color-text: #f7debb;
      --color-text-dim: #d1aa83;
      --color-border: #5b2a16;
      --color-scanline: rgba(255, 168, 102, 0.04);
      --rope: #c84b1b;
      --robe-shadow: #8e2715;
      --skin: #c89563;
      --skin-shadow: #845131;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      background: #140a07;
    }

    body[data-mode="svg"] {
      background:
        radial-gradient(circle at 50% 22%, color-mix(in srgb, var(--color-primary) 26%, transparent), transparent 20rem),
        linear-gradient(180deg, color-mix(in srgb, var(--color-bg-elevated) 92%, #000), var(--color-bg) 62%);
    }

    .shell {
      position: relative;
      width: 360px;
      height: 510px;
      overflow: hidden;
    }

    .svg-shell,
    .clone-shell {
      position: absolute;
      inset: 0;
    }

    body[data-mode="svg"] .clone-shell {
      display: none;
    }

    body[data-mode="clone"] .svg-shell {
      display: none;
    }

    .svg-shell {
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      color: var(--color-text);
    }

    .svg-title {
      text-align: center;
      letter-spacing: 0.38em;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--color-text-dim);
    }

    .preset-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .preset {
      padding: 7px 12px;
      border: 1px solid color-mix(in srgb, var(--color-border) 86%, #000);
      border-radius: 999px;
      background: color-mix(in srgb, var(--color-bg-elevated) 92%, #000);
      color: var(--color-text);
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 90ms linear, border-color 90ms linear, background 90ms linear;
    }

    .preset:hover {
      border-color: var(--color-primary);
      transform: translateY(-1px);
    }

    .preset.active {
      background: color-mix(in srgb, var(--color-primary) 22%, var(--color-bg-elevated));
      border-color: var(--color-primary);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--color-primary) 24%, transparent);
    }

    .stage {
      position: relative;
      min-height: 0;
      border-radius: 24px;
      overflow: hidden;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--color-primary) 11%, transparent), rgba(0, 0, 0, 0)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.18));
      border: 1px solid color-mix(in srgb, var(--color-border) 88%, #000);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 22px 40px rgba(0, 0, 0, 0.25);
    }

    .halo {
      position: absolute;
      inset: 6% 19% auto;
      height: 45%;
      border-radius: 999px;
      background: radial-gradient(circle, color-mix(in srgb, var(--color-primary) 46%, white), transparent 66%);
      filter: blur(22px);
      opacity: 0.52;
      pointer-events: none;
    }

    .robe {
      position: absolute;
      inset: auto 0 0;
      height: 46%;
      background:
        linear-gradient(125deg, var(--rope) 0 46%, var(--robe-shadow) 46% 62%, var(--rope) 62% 100%);
      clip-path: polygon(10% 100%, 21% 34%, 36% 12%, 50% 0%, 64% 12%, 79% 34%, 90% 100%);
      opacity: 0.94;
      pointer-events: none;
    }

    .face-wrap {
      position: absolute;
      inset: 10% 18% 6%;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .face {
      position: relative;
      width: 100%;
      aspect-ratio: 0.86;
      transform-origin: 50% 54%;
      transition: transform 70ms linear;
      pointer-events: auto;
      cursor: pointer;
    }

    .head {
      position: absolute;
      inset: 0;
      border-radius: 47% 47% 42% 42% / 38% 38% 54% 54%;
      background:
        radial-gradient(circle at 50% 24%, rgba(255, 231, 191, 0.34), transparent 32%),
        linear-gradient(180deg, var(--skin), var(--skin-shadow));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.26),
        inset 0 -18px 24px rgba(67, 31, 15, 0.25);
    }

    .brow {
      position: absolute;
      top: 25%;
      width: 24%;
      height: 7%;
      border-radius: 999px;
      background: #4a2818;
      filter: blur(0.5px);
    }

    .brow.left {
      left: 20%;
      transform: rotate(-13deg);
    }

    .brow.right {
      right: 20%;
      transform: rotate(13deg);
    }

    .eye {
      position: absolute;
      top: 36%;
      width: 10%;
      height: 5%;
      border-radius: 999px;
      background: #27140d;
    }

    .eye.left {
      left: 26%;
    }

    .eye.right {
      right: 26%;
    }

    .nose {
      position: absolute;
      left: 48%;
      top: 42%;
      width: 4%;
      height: 15%;
      border-radius: 999px;
      background: rgba(90, 46, 28, 0.55);
      transform: translateX(-50%);
    }

    .mouth {
      position: absolute;
      left: 50%;
      bottom: 18%;
      width: 34%;
      height: 10%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 26%, rgba(255, 180, 150, 0.85), rgba(98, 10, 6, 0.9) 78%);
      transform: translateX(-50%);
      box-shadow:
        0 0 0 4px rgba(97, 38, 24, 0.28),
        inset 0 3px 6px rgba(255, 195, 170, 0.2);
      transition:
        width 60ms linear,
        height 60ms linear,
        border-radius 60ms linear,
        bottom 60ms linear;
    }

    .chin-shadow {
      position: absolute;
      left: 50%;
      bottom: 8%;
      width: 28%;
      height: 7%;
      border-radius: 999px;
      background: rgba(61, 25, 14, 0.24);
      transform: translateX(-50%);
      filter: blur(7px);
    }

    .control-strip {
      position: relative;
      height: 82px;
      padding: 4px;
      border-radius: 22px;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--color-primary) 10%, transparent), rgba(0, 0, 0, 0)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.2));
      border: 1px solid color-mix(in srgb, var(--color-border) 88%, #000);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .pad {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background:
        linear-gradient(90deg, #1f315f 0 20%, #f0d28a 20% 40%, #8b1d1d 40% 60%, #f0d28a 60% 80%, #1f315f 80% 100%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        0 10px 20px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      cursor: crosshair;
      touch-action: none;
    }

    .pad::before,
    .pad::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .pad::before {
      background:
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(255, 255, 255, 0.18) 0 calc(50% + 1px), transparent 0),
        linear-gradient(180deg, transparent calc(50% - 1px), rgba(255, 255, 255, 0.18) 0 calc(50% + 1px), transparent 0);
    }

    .pad::after {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.08)),
        repeating-linear-gradient(90deg, transparent 0 29px, rgba(255, 255, 255, 0.06) 29px 30px);
      mix-blend-mode: soft-light;
    }

    .pad-label {
      position: absolute;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.8);
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    .pad-label.pitch {
      left: 14px;
      bottom: 10px;
    }

    .pad-label.vowel {
      right: 14px;
      top: 10px;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    .pad-hint {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17, 9, 5, 0.2);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.82);
      pointer-events: none;
    }

    .marker {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f6f4ef;
      border: 2px solid rgba(43, 19, 12, 0.78);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.28);
      transform: translate(-50%, -50%);
      transition: left 40ms linear, top 40ms linear;
      pointer-events: none;
    }

    .clone-shell {
      background: #140a07;
    }

    .panel {
      display: block;
      width: 360px;
      height: 510px;
      touch-action: none;
      cursor: default;
    }

    .chant {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%) translateY(-8px);
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(229, 138, 58, 0.9);
      background: rgba(40, 17, 10, 0.92);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
      color: #f7debb;
      font-size: 20px;
      letter-spacing: 0.22em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms linear, transform 180ms linear;
      z-index: 3;
    }

    .chant.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .error {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 8px;
      min-height: 1.2em;
      color: #ffcf7a;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      z-index: 4;
    }

    .error:empty {
      display: none;
    }

    .error.is-error {
      color: #ff8d73;
    }
  </style>
</head>
<body data-mode="svg">
  <div class="shell" id="uiShell">
    <div class="chant" id="chantFlash">ཨཨཨཨ</div>

    <div class="svg-shell">
      <div class="svg-title">Delay Lama NT</div>
      <div class="preset-strip" id="presetStrip"></div>
      <div class="stage">
        <div class="halo"></div>
        <div class="robe"></div>
        <div class="face-wrap">
          <div class="face" id="face">
            <div class="head"></div>
            <div class="brow left"></div>
            <div class="brow right"></div>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="nose"></div>
            <div class="mouth" id="mouth"></div>
            <div class="chin-shadow"></div>
          </div>
        </div>
      </div>
      <div class="control-strip">
        <div class="pad" id="playSurface">
          <div class="pad-label pitch">Pitch</div>
          <div class="pad-label vowel">Vowel</div>
          <div class="pad-hint">Drag to sing</div>
          <div class="marker" id="marker"></div>
        </div>
      </div>
    </div>

    <div class="clone-shell">
      <canvas class="panel" id="panelCanvas" width="360" height="510" aria-label="MonkSynth panel"></canvas>
    </div>

    <div class="error" id="errorBanner"></div>
  </div>

  <script>
    const ORIGINAL_PANEL_DATA = "__ORIGINAL_PANEL_DATA__";
    const ORIGINAL_HELP_DATA = "__ORIGINAL_HELP_DATA__";
    const ORIGINAL_MONK_STRIP_DATA = "__ORIGINAL_MONK_STRIP_DATA__";
    const ORIGINAL_FADER_RIGHT_SM_DATA = "__ORIGINAL_FADER_RIGHT_SM_DATA__";
    const ORIGINAL_FADER_DOWN_SM_DATA = "__ORIGINAL_FADER_DOWN_SM_DATA__";
    const ORIGINAL_FADER_DOWN_LARGE_DATA = "__ORIGINAL_FADER_DOWN_LARGE_DATA__";
    const ORIGINAL_KNOB_LEFT_DATA = "__ORIGINAL_KNOB_LEFT_DATA__";
    const ORIGINAL_KNOB_RIGHT_DATA = "__ORIGINAL_KNOB_RIGHT_DATA__";

    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const TAU = Math.PI * 2;

    const PANEL = {
      width: 360,
      height: 510,
      monk: { x: 22, y: 4, w: 311, h: 311 },
      info: { x: 285, y: 298, w: 39, h: 35 },
      xyPad: { x: 96, y: 362, w: 165, h: 80 },
      knobLeft: { x: 21, y: 448, w: 50, h: 50, frameHeight: 50, key: "glide" },
      knobRight: { x: 293, y: 447, w: 50, h: 50, frameHeight: 50, key: "voice" },
      vowelSlider: { x: 86, y: 358, w: 10, h: 89, handleW: 10, handleH: 10 },
      pitchSlider: { x: 91, y: 352, w: 175, h: 10, handleW: 10, handleH: 10 },
      delaySlider: { x: 102, y: 479, w: 155, h: 22, handleW: 20, handleH: 17, key: "delayMix" }
    };

    const IDLE_SEQ = [
      5, 3, 4, 3, 2, 1, 0, 1,
      5, 3, 4, 3, 5, 1, 0, 1,
      2, 3, 4, 3, 5, 1, 0, 1
    ];

    const MODE_ORDER = ["svg", "clone"];

    const SVG_PRESETS = [
      {
        id: "ritual",
        name: "Ritual",
        params: { glide: 0.5, voice: 0.5, delayMix: 0.8, delayRate: 0.5, vibrato: 0.0, aspiration: 0.5 }
      },
      {
        id: "choir",
        name: "Choir",
        params: { glide: 0.24, voice: 0.72, delayMix: 0.66, delayRate: 0.56, vibrato: 0.18, aspiration: 0.38 }
      },
      {
        id: "oracle",
        name: "Oracle",
        params: { glide: 0.7, voice: 0.34, delayMix: 0.9, delayRate: 0.42, vibrato: 0.08, aspiration: 0.63 }
      },
      {
        id: "dust",
        name: "Dust",
        params: { glide: 0.18, voice: 0.62, delayMix: 0.48, delayRate: 0.62, vibrato: 0.28, aspiration: 0.24 }
      }
    ];

    const state = {
      mode: "svg",
      pitchHz: 261.625565,
      note: 60,
      vowel: 0.5,
      velocity: 0,
      active: false,
      energy: 0,
      helpVisible: false,
      dragPointer: null,
      dragMode: null,
      dragNote: null,
      tapCount: 0,
      tapTimer: 0,
      idleHoldTicks: 0,
      idleShufflePos: 0,
      idleFrame: 5,
      idleTickCarry: 0,
      errorText: "",
      errorKind: "",
      selectedPreset: "ritual",
      params: {
        glide: 0.5,
        vowel: 0.5,
        voice: 0.5,
        vibrato: 0,
        vibratoRate: 0.5,
        aspiration: 0.5,
        attack: 0,
        decay: 0,
        sustain: 1,
        release: 0,
        unison: 1,
        detune: 0,
        voiceSpread: 0,
        delayMix: 0.8,
        delayRate: 0.5,
        level: 1
      }
    };

    const assets = {};
    const shell = document.getElementById("uiShell");
    const canvas = document.getElementById("panelCanvas");
    const ctx = canvas.getContext("2d");
    const chantFlash = document.getElementById("chantFlash");
    const errorBanner = document.getElementById("errorBanner");
    const face = document.getElementById("face");
    const mouth = document.getElementById("mouth");
    const marker = document.getElementById("marker");
    const playSurface = document.getElementById("playSurface");
    const presetStrip = document.getElementById("presetStrip");

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function toNumber(value, fallback) {
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric : fallback;
    }

    function midiName(note) {
      const rounded = Math.round(note);
      const octave = Math.floor(rounded / 12) - 1;
      return NOTE_NAMES[((rounded % 12) + 12) % 12] + octave;
    }

    function frequencyFromNote(note) {
      return 440 * Math.pow(2, (note - 69) / 12);
    }

    function noteFromFrequency(freq) {
      if (!(freq > 0)) {
        return 60;
      }
      return 69 + 12 * Math.log2(freq / 440);
    }

    function post(message) {
      window.parent.postMessage(message, "*");
    }

    function applyTheme(theme) {
      if (!theme || typeof theme !== "object") {
        return;
      }
      for (const [key, value] of Object.entries(theme)) {
        const cssKey = "--color-" + key.replace(/[A-Z]/g, (match) => "-" + match.toLowerCase());
        document.documentElement.style.setProperty(cssKey, value);
      }
    }

    function setError(text, kind = "") {
      state.errorText = text || "";
      state.errorKind = kind;
      errorBanner.textContent = state.errorText;
      errorBanner.classList.toggle("is-error", kind === "error");
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Could not load image"));
        img.src = src;
      });
    }

    function pointInRect(point, rect) {
      return point.x >= rect.x &&
        point.x <= rect.x + rect.w &&
        point.y >= rect.y &&
        point.y <= rect.y + rect.h;
    }

    function canvasPointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * canvas.width / rect.width,
        y: (event.clientY - rect.top) * canvas.height / rect.height
      };
    }

    function showChant() {
      chantFlash.classList.add("is-visible");
      window.clearTimeout(showChant.timer);
      showChant.timer = window.setTimeout(() => {
        chantFlash.classList.remove("is-visible");
      }, 900);
    }

    function resizeHostWindow() {
      try {
        const frame = window.frameElement;
        if (!frame) {
          return;
        }

        const rect = shell.getBoundingClientRect();
        const iframeWidth = Math.ceil(rect.width);
        const iframeHeight = Math.ceil(rect.height) + 2;
        const pluginUi = frame.closest(".plugin-ui");
        const viewport = pluginUi ? pluginUi.parentElement : null;
        const hostWindow = pluginUi ? pluginUi.closest(".instr-win") : null;
        const viewportWidth = iframeWidth + 24;
        const viewportHeight = iframeHeight + 28;
        const windowWidth = viewportWidth + 24;
        const windowHeight = viewportHeight + 40;

        frame.style.width = iframeWidth + "px";
        frame.style.height = iframeHeight + "px";
        frame.style.minWidth = iframeWidth + "px";
        frame.style.minHeight = iframeHeight + "px";
        frame.style.aspectRatio = "auto";
        frame.style.overflow = "hidden";
        frame.scrolling = "no";

        if (pluginUi) {
          pluginUi.style.width = iframeWidth + "px";
          pluginUi.style.height = iframeHeight + "px";
          pluginUi.style.minWidth = iframeWidth + "px";
          pluginUi.style.minHeight = iframeHeight + "px";
          pluginUi.style.flex = "0 0 auto";
          pluginUi.style.overflow = "hidden";
        }

        if (viewport) {
          viewport.style.width = viewportWidth + "px";
          viewport.style.height = viewportHeight + "px";
          viewport.style.minWidth = viewportWidth + "px";
          viewport.style.minHeight = viewportHeight + "px";
          viewport.style.flex = "0 0 auto";
          viewport.style.overflow = "hidden";
        }

        if (hostWindow) {
          hostWindow.style.width = windowWidth + "px";
          hostWindow.style.height = windowHeight + "px";
          hostWindow.style.minWidth = windowWidth + "px";
          hostWindow.style.minHeight = windowHeight + "px";
          hostWindow.style.overflow = "hidden";
        }
      } catch {
      }
    }

    function legacyKnobFrame(value) {
      return clamp(Math.round(clamp(value, 0, 1) * 59), 0, 59);
    }

    function pitchNormalized() {
      return clamp((noteFromFrequency(state.pitchHz) - 36) / 48, 0, 1);
    }

    function updateIdleFrame() {
      if (state.active) {
        state.idleFrame = clamp(6 + Math.round(state.vowel * 23), 6, 29);
        return;
      }

      state.idleHoldTicks += 1;

      if (state.idleFrame >= 6) {
        state.idleFrame = 5;
        state.idleHoldTicks = 0;
      }

      if (state.idleShufflePos === 0 && state.idleHoldTicks < 48) {
        if ((state.idleHoldTicks >= 14 && state.idleHoldTicks < 17) ||
            (state.idleHoldTicks >= 31 && state.idleHoldTicks < 34)) {
          state.idleFrame = 2;
        } else {
          state.idleFrame = 5;
        }
        if (state.idleHoldTicks >= 48) {
          state.idleShufflePos = 1;
          state.idleHoldTicks = 0;
          state.idleFrame = IDLE_SEQ[0];
        }
        return;
      }

      if (state.idleHoldTicks % 2 === 0) {
        const index = state.idleShufflePos % IDLE_SEQ.length;
        state.idleFrame = IDLE_SEQ[index];
        state.idleShufflePos = (state.idleShufflePos + 1) % IDLE_SEQ.length;
      }
    }

    function drawKnob(image, rect, value) {
      const frame = legacyKnobFrame(value);
      ctx.drawImage(
        image,
        0,
        frame * rect.frameHeight,
        rect.w,
        rect.frameHeight,
        rect.x,
        rect.y,
        rect.w,
        rect.h
      );
    }

    function drawSliderHandle(image, rect, normalized, vertical) {
      const span = vertical ? rect.h - rect.handleH : rect.w - rect.handleW;
      const offset = clamp(normalized, 0, 1) * span;
      const drawX = vertical ? rect.x : rect.x + offset;
      const drawY = vertical ? rect.y + (1 - normalized) * span : rect.y + (rect.h - rect.handleH) * 0.5;
      ctx.drawImage(image, drawX, drawY, rect.handleW, rect.handleH);
    }

    function roundRectPath(x, y, w, h, radius) {
      const r = Math.min(radius, w * 0.5, h * 0.5);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function currentFrameRect() {
      const frame = clamp(state.idleFrame, 0, 29);
      return {
        sx: Math.floor(frame / 6) * 314,
        sy: (frame % 6) * 311,
        sw: 311,
        sh: 311
      };
    }

    function drawMonkFrame(rect) {
      if (!assets.monkStrip) {
        return;
      }
      const frame = currentFrameRect();
      ctx.drawImage(
        assets.monkStrip,
        frame.sx,
        frame.sy,
        frame.sw,
        frame.sh,
        rect.x,
        rect.y,
        rect.w,
        rect.h
      );
    }

    function drawClonePanel() {
      if (!assets.panel) {
        return;
      }
      ctx.drawImage(assets.panel, 0, 0, PANEL.width, PANEL.height);
      drawMonkFrame(PANEL.monk);

      if (assets.knobLeft) {
        drawKnob(assets.knobLeft, PANEL.knobLeft, state.params.glide);
      }
      if (assets.knobRight) {
        drawKnob(assets.knobRight, PANEL.knobRight, state.params.voice);
      }
      if (assets.faderRightSm) {
        drawSliderHandle(assets.faderRightSm, PANEL.vowelSlider, state.vowel, true);
      }
      if (assets.faderDownSm) {
        drawSliderHandle(assets.faderDownSm, PANEL.pitchSlider, pitchNormalized(), false);
      }
      if (assets.faderDownLarge) {
        drawSliderHandle(assets.faderDownLarge, PANEL.delaySlider, state.params.delayMix, false);
      }

      if (state.helpVisible && assets.help) {
        ctx.drawImage(assets.help, 54, 110, 253, 275);
      }
    }

    function renderPresets() {
      presetStrip.innerHTML = "";
      for (const preset of SVG_PRESETS) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "preset" + (preset.id === state.selectedPreset ? " active" : "");
        button.textContent = preset.name;
        button.addEventListener("click", () => {
          applyPreset(preset);
        });
        presetStrip.appendChild(button);
      }
    }

    function emitParam(key, value) {
      const normalized = toNumber(value, state.params[key] ?? 0);
      state.params[key] = normalized;
      if (key === "vowel") {
        state.vowel = normalized;
      }
      post({ type: "paramWrite", key, value: normalized });
    }

    function applyPreset(preset) {
      if (!preset) {
        return;
      }
      state.selectedPreset = preset.id;
      renderPresets();
      for (const [key, value] of Object.entries(preset.params)) {
        emitParam(key, value);
      }
    }

    function updatePitchAndVowel(note, vowel) {
      state.note = note;
      state.pitchHz = frequencyFromNote(note);
      state.vowel = clamp(vowel, 0, 1);
      state.params.vowel = state.vowel;

      post({ type: "paramWrite", key: "vowel", value: Number(state.vowel.toFixed(4)) });

      if (state.dragNote !== note) {
        if (state.dragNote !== null) {
          post({ type: "noteOff", note: state.dragNote });
        }
        post({ type: "noteOn", note, velocity: 112 });
        state.dragNote = note;
      }

      state.active = true;
      state.velocity = 112 / 127;
    }

    function releaseDrag(pointerId) {
      if (pointerId !== undefined && state.dragPointer !== null && state.dragPointer !== pointerId) {
        return;
      }
      if (state.dragNote !== null) {
        post({ type: "noteOff", note: state.dragNote });
      }
      state.dragPointer = null;
      state.dragMode = null;
      state.dragNote = null;
      state.active = false;
      state.velocity = 0;
    }

    function toggleMode() {
      const currentIndex = MODE_ORDER.indexOf(state.mode);
      state.mode = MODE_ORDER[(currentIndex + 1) % MODE_ORDER.length];
      state.tapCount = 0;
      state.helpVisible = false;
      document.body.dataset.mode = state.mode;
      showChant();
      resizeHostWindow();
    }

    function registerHeadTap() {
      state.tapCount += 1;
      window.clearTimeout(state.tapTimer);
      state.tapTimer = window.setTimeout(() => {
        state.tapCount = 0;
      }, 1400);
      if (state.tapCount >= 5) {
        toggleMode();
      }
    }

    function updateSvgFromEvent(event) {
      const rect = playSurface.getBoundingClientRect();
      const x = clamp((event.clientX - rect.left) / rect.width, 0, 1);
      const y = clamp((event.clientY - rect.top) / rect.height, 0, 1);
      updatePitchAndVowel(Math.round(36 + x * 48), 1 - y);
    }

    function updateCloneFromXY(point) {
      const x = clamp((point.x - PANEL.xyPad.x) / PANEL.xyPad.w, 0, 1);
      const y = clamp((point.y - PANEL.xyPad.y) / PANEL.xyPad.h, 0, 1);
      updatePitchAndVowel(Math.round(36 + x * 48), 1 - y);
    }

    function updateDelayFromPoint(point) {
      const normalized = clamp(
        (point.x - PANEL.delaySlider.x) / (PANEL.delaySlider.w - PANEL.delaySlider.handleW),
        0,
        1
      );
      emitParam("delayMix", normalized);
    }

    function updateKnobFromPoint(key, startValue, startY, pointY) {
      emitParam(key, clamp(startValue - (pointY - startY) / 180, 0, 1));
    }

    function renderSvgUi() {
      const note = noteFromFrequency(state.pitchHz);
      const headScale = 0.78 + state.params.voice * 0.44;
      const mouthWidth = 50 + state.vowel * 72;
      const mouthHeight = 6 + state.energy * (12 + state.vowel * 16);
      const markerX = clamp((note - 36) / 48, 0, 1) * 100;
      const markerY = (1 - state.vowel) * 100;

      face.style.transform = "scale(" + headScale.toFixed(3) + ")";
      mouth.style.width = mouthWidth.toFixed(1) + "px";
      mouth.style.height = mouthHeight.toFixed(1) + "px";
      mouth.style.bottom = (14 + state.energy * 4).toFixed(1) + "%";
      mouth.style.borderRadius = (20 + state.vowel * 40).toFixed(1) + "px";

      marker.style.left = markerX.toFixed(2) + "%";
      marker.style.top = markerY.toFixed(2) + "%";
    }

    function onCanvasPointerDown(event) {
      if (state.mode !== "clone") {
        return;
      }
      const point = canvasPointFromEvent(event);
      state.dragPointer = event.pointerId;

      if (state.helpVisible && !pointInRect(point, { x: 54, y: 110, w: 253, h: 275 })) {
        state.helpVisible = false;
      }

      if (pointInRect(point, PANEL.info)) {
        state.helpVisible = !state.helpVisible;
        return;
      }

      if (pointInRect(point, PANEL.monk)) {
        registerHeadTap();
        return;
      }

      if (pointInRect(point, PANEL.knobLeft)) {
        state.dragMode = {
          type: "knob",
          key: "glide",
          startValue: state.params.glide,
          startY: point.y
        };
        return;
      }

      if (pointInRect(point, PANEL.knobRight)) {
        state.dragMode = {
          type: "knob",
          key: "voice",
          startValue: state.params.voice,
          startY: point.y
        };
        return;
      }

      if (pointInRect(point, PANEL.delaySlider)) {
        state.dragMode = { type: "delay" };
        updateDelayFromPoint(point);
        return;
      }

      if (pointInRect(point, PANEL.xyPad) ||
          pointInRect(point, PANEL.vowelSlider) ||
          pointInRect(point, PANEL.pitchSlider)) {
        state.dragMode = { type: "xy" };
        updateCloneFromXY(point);
      }
    }

    function onWindowPointerMove(event) {
      if (state.dragPointer !== event.pointerId || !state.dragMode || state.mode !== "clone") {
        return;
      }
      const point = canvasPointFromEvent(event);
      if (state.dragMode.type === "xy") {
        updateCloneFromXY(point);
      } else if (state.dragMode.type === "delay") {
        updateDelayFromPoint(point);
      } else if (state.dragMode.type === "knob") {
        updateKnobFromPoint(state.dragMode.key, state.dragMode.startValue, state.dragMode.startY, point.y);
      }
    }

    function onWindowPointerUp(event) {
      if (state.mode === "clone" && state.dragMode && state.dragMode.type === "xy") {
        releaseDrag(event.pointerId);
      }
      if (state.dragPointer === event.pointerId) {
        state.dragPointer = null;
        state.dragMode = null;
      }
    }

    function render(now) {
      state.energy += ((state.active ? 0.25 + state.velocity * 0.75 : 0) - state.energy) * 0.12;

      if (!render.lastTime) {
        render.lastTime = now;
      }
      const delta = now - render.lastTime;
      render.lastTime = now;
      state.idleTickCarry += delta;
      while (state.idleTickCarry >= 100) {
        updateIdleFrame();
        state.idleTickCarry -= 100;
      }

      renderSvgUi();
      if (state.mode === "clone") {
        ctx.clearRect(0, 0, PANEL.width, PANEL.height);
        drawClonePanel();
      }

      requestAnimationFrame(render);
    }

    function bootAssets() {
      return Promise.all([
        loadImage(ORIGINAL_PANEL_DATA).then((img) => { assets.panel = img; }),
        loadImage(ORIGINAL_HELP_DATA).then((img) => { assets.help = img; }),
        loadImage(ORIGINAL_MONK_STRIP_DATA).then((img) => { assets.monkStrip = img; }),
        loadImage(ORIGINAL_FADER_RIGHT_SM_DATA).then((img) => { assets.faderRightSm = img; }),
        loadImage(ORIGINAL_FADER_DOWN_SM_DATA).then((img) => { assets.faderDownSm = img; }),
        loadImage(ORIGINAL_FADER_DOWN_LARGE_DATA).then((img) => { assets.faderDownLarge = img; }),
        loadImage(ORIGINAL_KNOB_LEFT_DATA).then((img) => { assets.knobLeft = img; }),
        loadImage(ORIGINAL_KNOB_RIGHT_DATA).then((img) => { assets.knobRight = img; })
      ]).catch((error) => {
        setError(error.message || String(error), "error");
      });
    }

    face.addEventListener("pointerdown", () => {
      registerHeadTap();
    });

    playSurface.addEventListener("pointerdown", (event) => {
      if (state.mode !== "svg") {
        return;
      }
      state.dragPointer = event.pointerId;
      playSurface.setPointerCapture(event.pointerId);
      state.dragMode = { type: "svg-xy" };
      updateSvgFromEvent(event);
    });

    playSurface.addEventListener("pointermove", (event) => {
      if (state.mode !== "svg" || state.dragPointer !== event.pointerId) {
        return;
      }
      updateSvgFromEvent(event);
    });

    playSurface.addEventListener("pointerup", (event) => {
      if (state.mode === "svg" && state.dragPointer === event.pointerId) {
        releaseDrag(event.pointerId);
      }
    });

    playSurface.addEventListener("pointercancel", (event) => {
      if (state.mode === "svg" && state.dragPointer === event.pointerId) {
        releaseDrag(event.pointerId);
      }
    });

    canvas.addEventListener("pointerdown", onCanvasPointerDown);
    window.addEventListener("pointermove", onWindowPointerMove);
    window.addEventListener("pointerup", onWindowPointerUp);
    window.addEventListener("pointercancel", onWindowPointerUp);
    window.addEventListener("blur", () => {
      releaseDrag();
      state.dragPointer = null;
      state.dragMode = null;
    });

    window.addEventListener("resize", resizeHostWindow);

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (!message || typeof message !== "object") {
        return;
      }

      switch (message.type) {
        case "noteOn":
          state.note = toNumber(message.note, state.note);
          state.velocity = toNumber(message.velocity, 100) / 127;
          state.pitchHz = typeof message.frequency === "number" ? message.frequency : frequencyFromNote(state.note);
          state.active = true;
          break;
        case "noteOff":
        case "allNotesOff":
          state.active = false;
          state.velocity = 0;
          state.dragNote = null;
          break;
        case "pitch":
          state.pitchHz = toNumber(message.frequencyHz ?? message.frequency, state.pitchHz);
          break;
        case "param":
          if (typeof message.key === "string" && Object.prototype.hasOwnProperty.call(state.params, message.key)) {
            state.params[message.key] = toNumber(message.value, state.params[message.key]);
            if (message.key === "vowel") {
              state.vowel = state.params.vowel;
            }
          }
          break;
        case "themeChange":
          applyTheme(message.theme ?? message.value ?? message);
          break;
        case "__nt_error":
          setError(message.message || message.error || "Plugin error", "error");
          break;
        default:
          break;
      }
    });

    renderPresets();
    renderSvgUi();
    document.body.dataset.mode = state.mode;

    bootAssets().finally(() => {
      resizeHostWindow();
      requestAnimationFrame(render);
      const initialPreset = SVG_PRESETS.find((preset) => preset.id === state.selectedPreset) || SVG_PRESETS[0];
      if (initialPreset) {
        applyPreset(initialPreset);
      }
    });
  </script>
</body>
</html>
